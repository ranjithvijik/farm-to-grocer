# FARM-TO-GROCER MVP - AWS AMPLIFY BUILD SPECIFICATION
# Next.js 14 SSR on AWS Amplify Hosting

version: 1

applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - "echo Node.js version && node --version"
            - "echo npm version && npm --version"
            
            # Validate required environment variables
            - |
              echo "Validating environment variables..."
              if [ -z "$DATABASE_URL" ]; then echo "ERROR - DATABASE_URL is not set" && exit 1; fi
              if [ -z "$NEXTAUTH_SECRET" ]; then echo "ERROR - NEXTAUTH_SECRET is not set" && exit 1; fi
              echo "Required environment variables are present."

            # Install dependencies (legacy-peer-deps for next-auth compatibility)
            - "npm ci --legacy-peer-deps"
            
            # Generate Prisma client
            - "npx prisma generate"
            
            # Database tasks (non-fatal so app can deploy without DB)
            - |
              if [ "$AWS_BRANCH" = "main" ] || [ "$AWS_BRANCH" = "production" ]; then
                echo "--- DATABASE TASKS (non-fatal) ---"
                echo "Testing connectivity..."
                if npx ts-node --compiler-options '{"module":"CommonJS"}' scripts/test-db-connection.ts; then
                  echo "Database reachable!"
                  echo "Running database migrations..."
                  if npx prisma migrate deploy; then
                    echo "Migrations completed successfully."
                  else
                    echo "WARNING - Migrations failed, continuing build."
                  fi
                  if [ "$FORCE_SEED" = "true" ]; then
                    echo "Force seeding database..."
                    if npx prisma db seed; then
                      echo "Seeding completed successfully."
                    else
                      echo "WARNING - Seeding failed, continuing build."
                    fi
                  fi
                else
                  echo "WARNING - Database not reachable, skipping migrations and seeding."
                  echo "The app will deploy but DB features will not work until connectivity is fixed."
                fi
              else
                echo "Skipping database tasks for non-production branch."
              fi

        build:
          commands:
            - "echo Building Farm-to-Grocer for branch $AWS_BRANCH"
            - "echo Commit $AWS_COMMIT_ID"
            - |
              if [ "$AWS_BRANCH" = "main" ] || [ "$AWS_BRANCH" = "production" ]; then
                export NODE_ENV=production
                echo "Building for PRODUCTION"
              else
                export NODE_ENV=development
                echo "Building for DEVELOPMENT"
              fi
            - "npm run build"
            - "echo Build completed successfully"

        postBuild:
          commands:
            - "echo Post-build phase complete"

      artifacts:
        baseDirectory: .next
        files:
          - "**/*"

      cache:
        paths:
          - "node_modules/**/*"
          - ".next/cache/**/*"
          - "node_modules/.prisma/**/*"
          - "~/.npm/**/*"

customHeaders:
  - pattern: "**/*"
    headers:
      - key: "Strict-Transport-Security"
        value: "max-age=31536000; includeSubDomains"
      - key: "X-Content-Type-Options"
        value: "nosniff"
      - key: "X-Frame-Options"
        value: "DENY"
      - key: "X-XSS-Protection"
        value: "1; mode=block"
      - key: "Referrer-Policy"
        value: "strict-origin-when-cross-origin"
  - pattern: "/_next/static/**/*"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"
  - pattern: "/images/**/*"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=86400"

customRules:
  - source: "/<*>"
    target: "/index.html"
    status: "404-200"
  - source: "/api/<*>"
    target: "/api/<*>"
    status: "200"
  - source: "/_next/<*>"
    target: "/_next/<*>"
    status: "200"
