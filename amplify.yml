# ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
# FARM-TO-GROCER MVP - AWS AMPLIFY BUILD SPECIFICATION
# ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
#
# This amplify.yml configures the CI/CD pipeline for deploying
# a Next.js 14 SSR application to AWS Amplify Hosting.
#
# Documentation: https://docs.aws.amazon.com/amplify/latest/userguide/
#
# Features:
# - Next.js 14 App Router with SSR support
# - Prisma database migrations
# - Environment variable injection
# - Build caching for faster deployments
# - Preview deployments for pull requests
#
# ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą

version: 1

# ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
# APPLICATIONS (Frontend + Backend)
# ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą

applications:
  - appRoot: .
    frontend:
      # ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
      # BUILD PHASES
      # ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
      phases:
        # ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
        # PRE-BUILD: Install dependencies & setup
        # ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
        preBuild:
          commands:
            # Display Node.js and npm versions for debugging
            - echo "Node.js version:" && node --version
            - echo "npm version:" && npm --version
            
            # --- BACKEND CONNECTIVITY VALIDATION ---
            - |
              echo "Validating environment variables..."
              if [ -z "$DATABASE_URL" ]; then echo "ERROR: DATABASE_URL is not set" && exit 1; fi
              if [ -z "$NEXTAUTH_SECRET" ]; then echo "ERROR: NEXTAUTH_SECRET is not set" && exit 1; fi
              echo "Required environment variables are present."

            # Install dependencies
            # Using --legacy-peer-deps to resolve next-auth/nodemailer version conflicts
            - npm ci --legacy-peer-deps
            
            # Generate Prisma client
            - npx prisma generate
            
            # --- DATABASE MIGRATIONS & SEEDING (non-fatal) ---
            # Database tasks are non-blocking so the app can deploy
            # even if DB connectivity isn't ready yet.
            - |
              if [ "$AWS_BRANCH" = "main" ] || [ "$AWS_BRANCH" = "production" ]; then
                echo "--- DATABASE TASKS (non-fatal) ---"
                
                echo "Testing connectivity..."
                if npx ts-node --compiler-options '{"module":"CommonJS"}' scripts/test-db-connection.ts; then
                  echo "â Database reachable!"
                  
                  echo "Running database migrations..."
                  if npx prisma migrate deploy; then
                    echo "â Migrations completed successfully."
                  else
                    echo "â ïž Migrations failed â continuing build anyway."
                  fi
                  
                  if [ "$FORCE_SEED" = "true" ]; then
                    echo "Force seeding database..."
                    if npx prisma db seed; then
                      echo "â Seeding completed successfully."
                    else
                      echo "â ïž Seeding failed â continuing build anyway."
                    fi
                  fi
                else
                  echo "â ïž Database not reachable â skipping migrations/seeding."
                  echo "â ïž The app will deploy but DB features won't work until connectivity is fixed."
                fi
              else
                echo "Skipping production-level database tasks for branch: $AWS_BRANCH"
              fi

        # ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
        # BUILD: Compile the application
        # ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
        build:
          commands:
            # Display build information
            - echo "Building Farm-to-Grocer for branch: $AWS_BRANCH"
            - echo "Commit: $AWS_COMMIT_ID"
            
            # Set environment-specific variables
            - |
              if [ "$AWS_BRANCH" = "main" ] || [ "$AWS_BRANCH" = "production" ]; then
                export NODE_ENV=production
                echo "Building for PRODUCTION"
              else
                export NODE_ENV=development
                echo "Building for PREVIEW/DEVELOPMENT"
              fi
            
            # Run Next.js build
            - npm run build
            
            # Display build completion
            - echo "Build completed successfully!"

        # ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
        # POST-BUILD: Cleanup & verification (optional)
        # ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
        postBuild:
          commands:
            - echo "Post-build phase complete"

      # ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
      # BUILD ARTIFACTS
      # ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
      artifacts:
        # Base directory for Next.js SSR output
        # IMPORTANT: Must be .next for SSR applications
        baseDirectory: .next
        
        # Files to include in deployment
        files:
          - '**/*'

      # ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
      # BUILD CACHE
      # ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
      # Caching significantly speeds up subsequent builds
      cache:
        paths:
          # Cache node_modules to speed up npm ci
          - node_modules/**/*
          
          # Cache Next.js build cache
          - .next/cache/**/*
          
          # Cache Prisma client
          - node_modules/.prisma/**/*
          
          # Cache npm cache directory
          - ~/.npm/**/*

      # ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
      # BUILD SETTINGS
      # ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
      buildSettings:
        # Build timeout in minutes (default: 30)
        # Increase for larger projects
        buildTimeout: 30

# ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
# CUSTOM HEADERS (Optional)
# ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'Strict-Transport-Security'
        value: 'max-age=31536000; includeSubDomains'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'X-Frame-Options'
        value: 'DENY'
      - key: 'X-XSS-Protection'
        value: '1; mode=block'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'

  # Cache static assets
  - pattern: '/_next/static/**/*'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'

  # Cache images
  - pattern: '/images/**/*'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=86400'

# ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
# REDIRECTS & REWRITES
# ĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂąĂą
customRules:
  # Handle 404 errors - redirect to custom 404 page
  - source: '/<*>'
    target: '/index.html'
    status: '404-200'

  # API routes should not be rewritten
  - source: '/api/<*>'
    target: '/api/<*>'
    status: '200'

  # Static files
  - source: '/_next/<*>'
    target: '/_next/<*>'
    status: '200'
