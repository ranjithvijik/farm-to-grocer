# FARM-TO-GROCER MVP - AWS AMPLIFY BUILD SPECIFICATION
# This configures CI/CD for Next.js 14 SSR on AWS Amplify.

version: 1

applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - 'echo "Node.js version:" && node --version'
            - 'echo "npm version:" && npm --version'
            
            # --- BACKEND CONNECTIVITY VALIDATION ---
            - |
              echo "Validating environment variables..."
              if [ -z "$DATABASE_URL" ]; then echo "ERROR: DATABASE_URL is not set" && exit 1; fi
              if [ -z "$NEXTAUTH_SECRET" ]; then echo "ERROR: NEXTAUTH_SECRET is not set" && exit 1; fi
              echo "Required environment variables are present."

            - 'npm ci'
            - 'npx prisma generate'
            
            # --- DATABASE MIGRATIONS & SEEDING ---
            - |
              if [ "$AWS_BRANCH" = "main" ] || [ "$AWS_BRANCH" = "production" ]; then
                echo "Running database migrations..."
                npx prisma migrate deploy
                
                # Check if seeding is needed (e.g., first deploy)
                # You can set FORCE_SEED=true in Amplify Console to re-run seed
                if [ "$FORCE_SEED" = "true" ]; then
                  echo "Force seeding database..."
                  npx prisma db seed
                fi
              else
                echo "Skipping production-level database tasks for branch $AWS_BRANCH"
              fi
        build:
          commands:
            - 'echo "Building Farm-to-Grocer for branch $AWS_BRANCH"'
            - 'echo "Commit: $AWS_COMMIT_ID"'
            - |
              if [ "$AWS_BRANCH" = "main" ] || [ "$AWS_BRANCH" = "production" ]; then
                export NODE_ENV=production
                echo "Building for PRODUCTION"
              else
                export NODE_ENV=development
                echo "Building for PREVIEW/DEVELOPMENT"
              fi
            - 'npm run build'
            - 'echo "Build completed successfully!"'
        postBuild:
          commands:
            - 'echo "Post-build phase complete"'
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - 'node_modules/**/*'
          - '.next/cache/**/*'
          - 'node_modules/.prisma/**/*'
          - '~/.npm/**/*'

customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'Strict-Transport-Security'
        value: 'max-age=31536000; includeSubDomains'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'X-Frame-Options'
        value: 'DENY'
      - key: 'X-XSS-Protection'
        value: '1; mode=block'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
  - pattern: '/_next/static/**/*'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '/images/**/*'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=86400'

customRules:
  - source: '/<*>'
    target: '/index.html'
    status: '404-200'
  - source: '/api/<*>'
    target: '/api/<*>'
    status: '200'
  - source: '/_next/<*>'
    target: '/_next/<*>'
    status: '200'
